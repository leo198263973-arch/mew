<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miau</title>

  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilos.css">
</head>

<body>

  <!-- PANTALLAS -->
  <section class="pantalla activa" id="inicio">
    <h1 class="titulo">¡Hola!</h1> 
    <p class="texto">Bienvenido a mi pagina pro, ohsi, ohsi. 👅</p>
    <p class="texto"></p>
    <p class="texto"></p>
  </section>

  <section class="pantalla" id="miau">
    <h1 class="titulo">miau</h1>
    <p class="texto"></p>
  </section>

  <section class="pantalla" id="ñam">
    <h1 class="titulo">No sé que poner aquí:p</h1>
    <p class="texto"></p>
  </section>

  <section class="pantalla" id="👅">
    <h1 class="titulo">miau</h1>
    <p class="texto"></p>
  </section>

  <!-- EXTRAS -->
  <section class="pantalla" id="ohsi">
    <h1 class="titulo">Preguntas o sugerencias.</h1>

    <form id="formulario">
      <textarea name="message" placeholder="Escribe aquí..." required></textarea>
      <button type="submit">Enviar</button>
    </form>

    <div id="mensaje-exito">
      <h2> ¡Mensaje enviado con éxito! </h2>
      <p>Gracias por mandar tu preguntita 😼</p>
      <button class="btn-otra" onclick="otraPregunta()">Enviar otra pregunta.</button>
    </div>

    <!-- RESPUESTAS -->
    <div class="respuestas">
      <h2 class="titulo">Respuestas 💬</h2>

      <div class="respuesta">
        <p class="pregunta">❓ </p>
        <p class="respuesta-texto"></p>
      </div>

      <div class="respuesta">
        <p class="pregunta">❓ </p>
        <p class="respuesta-texto"></p>
      </div>
    </div>
  </section>

  <!-- BOTONERA -->
  <div class="botonera">
    <button onclick="cambiarPantalla('inicio')">Inicio</button>
    <button onclick="cambiarPantalla('miau')">miaua</button>
    <button onclick="cambiarPantalla('ñam')">ñam</button>
    <button onclick="cambiarPantalla('👅')">👅</button>
    <button onclick="cambiarPantalla('ohsi')">ohsi</button>
  </div>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
